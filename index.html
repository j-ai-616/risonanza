<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Risonanza</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background-color: #0f0f0f;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      padding: 24px;
      max-width: 720px;
    }

    h1 {
      font-size: 52px;
      font-weight: 700;
      letter-spacing: 1px;
      margin: 0 0 14px 0;
      color: #ffffff;
      line-height: 1.2;
    }

    .sub-title-ko {
      font-size: 18px;
      color: #cfcfcf;
      margin: 0 0 10px 0;
      letter-spacing: 0.2px;
    }

    .sub-title-en {
      font-size: 15px;
      color: #7e7e7e;
      margin: 0 0 36px 0;
      letter-spacing: 0.3px;
    }

    .message {
      font-size: 15px;
      color: #a8a8a8;
      margin: 0 0 40px 0;
      line-height: 1.7;
    }

    .contact-link {
      display: inline-block;
      font-size: 14px;
      color: #d8d8d8;
      text-decoration: none;
      border: 1px solid #2c2c2c;
      padding: 10px 18px;
      border-radius: 999px;
      transition: all 0.2s ease;
    }

    .contact-link:hover {
      background-color: #ffffff;
      color: #0f0f0f;
      border-color: #ffffff;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>리소난차 (Risonanza)</h1>
    <p class="sub-title-ko">데이터의 울림을 해석하다</p>
    <p class="sub-title-en">Data that resonates</p>

    <p class="message">의미 있는 시작을 준비하고 있습니다.</p>

    <a class="contact-link" href="mailto:contact@risonanza.kr">문의하기</a>
  </div>
</body>
</html>
